# Usar cuando la raíz del repositorio GitHub ES esta carpeta (solo censo-playwright).
# Si el repo es un monorepo con censo-playwright dentro, usa el workflow en .github de la raíz padre.

name: Censo capturas — Windows (.exe)

on:
  workflow_dispatch:
  push:
    tags:
      - "censo-v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build installer (NSIS)
        run: npm run dist:win

      - uses: actions/upload-artifact@v4
        with:
          name: CensoCapturas-Windows-Setup
          path: release/*.exe
          if-no-files-found: error
